<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netjes Geregeld</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div>
      <h1>Netjes Geregeld</h1>
      <p>Boodschappenlijst</p>
    </div>

    <button class="cart-btn">Winkelwagen</button>
  </header>

  <main>
    <input id="search" type="text" placeholder="Zoek producten..." />

    <div id="categories"></div>

    <section id="products"></section>
  </main>

  <script src="app.js"></script>

  <div id="cartOverlay" class="cart-overlay"></div>

<aside id="cartPanel" class="cart-panel">
  <div class="cart-header">
    <div class="cart-icon">▣</div>
    <div>
      <h2>Winkelwagen</h2>
      <p id="cartCount">0 items</p>
    </div>
    <button id="closeCart" class="close-cart">×</button>
  </div>

  <div id="cartContent" class="cart-content"></div>

  <div class="cart-footer">
    <div class="cart-total">
      <span>Totaal</span>
      <strong id="cartTotal">€0</strong>
    </div>

    <div class="cart-actions">
      <button id="clearCart" class="clear-btn">Leegmaken</button>
      <button id="orderBtn" class="order-btn">Bestelling Plaatsen</button>
    </div>
  </div>
</aside>

</body>
</html>
