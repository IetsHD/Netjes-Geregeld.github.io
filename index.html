<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netjes Geregeld - Boodschappenlijst</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="logo.png" alt="Netjes Geregeld logo" onerror="this.style.display='none'" />
      </div>

      <div>
        <h1>Netjes Geregeld</h1>
        <p>Boodschappenlijst</p>
      </div>
    </div>

    <div class="top-actions">
      <button class="secondary-button" id="newProductBtn">
        <span>＋</span>
        Nieuw Product
      </button>

      <button class="cart-button" id="openCartBtn">
        🛒 Winkelwagen
        <span id="cartCount" class="cart-count">0</span>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="toolbar">
      <div class="search-wrap">
        <span>🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Zoek producten..."
          autocomplete="off"
        />
      </div>

      <div id="categoryFilters" class="category-filters"></div>
    </section>

    <section id="productList" class="product-list"></section>
  </main>

  <!-- Winkelwagen scherm -->
  <aside class="cart-screen" id="cartScreen" aria-hidden="true">
    <div class="cart-panel">
      <div class="cart-header">
        <div>
          <h2>Winkelwagen</h2>
          <p>Overzicht van je boodschappen</p>
        </div>

        <button class="icon-button" id="closeCartBtn" aria-label="Sluit winkelwagen">
          ✕
        </button>
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Aantal producten</span>
          <strong id="summaryItems">0</strong>
        </div>

        <div class="summary-row total">
          <span>Totaal</span>
          <strong id="summaryTotal">€0</strong>
        </div>

        <button class="danger-button" id="clearCartBtn">
          Winkelwagen leegmaken
        </button>
      </div>
    </div>
  </aside>

  <!-- Nieuw product modal -->
  <aside class="modal-screen" id="productModal" aria-hidden="true">
    <form class="modal-panel" id="productForm">
      <div class="modal-header">
        <h2>Nieuw Product</h2>
        <button type="button" class="icon-button" id="closeProductModalBtn">
          ✕
        </button>
      </div>

      <label>
        Productnaam
        <input type="text" id="newProductName" required placeholder="Bijvoorbeeld: Druiven" />
      </label>

      <label>
        Categorie
        <input type="text" id="newProductCategory" required placeholder="Bijvoorbeeld: NPC Fruit" />
      </label>

      <label>
        Prijs
        <input type="number" id="newProductPrice" required min="0" step="1" placeholder="5" />
      </label>

      <button type="submit" class="cart-button full-width">
        Product toevoegen
      </button>
    </form>
  </aside>

  <script src="app.js"></script>
</body>
</html>
